<!DOCTYPE html>
<html lang="pl">

<head>

  <title>Karta Gracza</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="card-section bio">

      <p>Klasa: <strong>Rycerz</strong></p>
      <p>Gildia: <strong>Zakon pixeli</strong></p>

    <section class="card-section equipment">
      <h2>Ekwipunek</h2>
      <ul>
        <li>Miecz</li>
        <li>Tarcza</li>
        <li>Zbroja</li>
      </ul>

    <section class="card-section achievements">
      <h2>Osiągnięcia</h2>
      <ul>
        <li>Pogromca Smoków</li>
        <li>Paladyn</li>
        <li>Mistrz miecza</li>
      </ul>
    </section>

    <footer class="card-footer">
      <p>Ostatnia aktywność: <time datetime="2026-06-08"> 8 czerwca 2026</time></p>
    </footer>



  </main>

</html>
